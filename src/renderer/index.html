<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://*.posthog.com https://*.i.posthog.com; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:* http://localhost:* https://unpkg.com https://maestroapp.dev https://*.maestroapp.dev https://*.posthog.com https://*.i.posthog.com; img-src 'self' data: blob: https:; media-src 'self' blob:;" />
    <title>Maestro</title>
    <!-- Prevent theme flash: detect system/stored theme before render -->
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored === 'light' ? 'light' : stored === 'dark' ? 'dark' : (prefersDark ? 'dark' : 'light');
        document.documentElement.classList.add(theme);
      })();
    </script>
    <style>
      /* Loading state before React loads - respects system theme */
      :root {
        --loading-bg: #ffffff;
        --loading-text: #09090b;
        --loading-logo: #a1a1aa;
      }
      .dark {
        --loading-bg: #09090b;
        --loading-text: #fafafa;
        --loading-logo: #71717a;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        background: var(--loading-bg);
        color: var(--loading-text);
      }
      /* Loading container - hidden when React renders */
      .loading-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--loading-bg);
        z-index: 9999;
        transition: opacity 150ms ease-out;
      }
      /* Hide loading when root has content */
      #root:not(:empty) + .loading-container,
      #root:not(:empty) ~ .loading-container {
        opacity: 0;
        pointer-events: none;
      }
      .loading-logo {
        width: 24px;
        height: 24px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .loading-logo path {
        fill: var(--loading-logo);
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Loading indicator - separate from root so :empty works -->
    <div class="loading-container">
      <svg class="loading-logo" viewBox="0 0 984.63 849.11" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M885.32,488.23l99.31-115.94V127.37L876.8,0h-334.83l-52.12,60.77L438.4,0H114.92L5.68,127.37v164.92h114.92v-78.38c0-33.73,8.73-60.13,26.25-79.19,17.49-19.04,40.9-28.58,70.23-28.58h113.5c32.14,0,57.22,10.36,75.2,31.02,17.96,20.7,26.96,48.99,26.96,84.91v129H109.25L0,476.8v244.94l109.25,127.37h273.82l65.27-75.11,38.31,75.11h385.91l109.25-127.37v-166.56h-113.5v83.28c0,31.59-8.76,56.9-26.25,75.93-17.51,19.06-40.92,28.58-70.23,28.58h-122.01c-32.17,0-57.24-10.34-75.2-31.03-17.98-20.67-26.96-48.98-26.96-84.9v-138.8h337.67ZM547.65,222.07c0-35.92,8.98-64.22,26.96-84.91,17.96-20.67,43.03-31.02,75.2-31.02h129.11c28.38,0,50.83,8.99,67.39,26.95,16.54,17.96,24.83,42.73,24.83,74.29v86.55c0,30.49-8.51,54.44-25.54,71.85-17.03,17.42-40.21,26.12-69.52,26.12h-228.42v-169.82ZM306.46,742.97h-102.15c-28.38,0-50.37-8.98-65.98-26.94-15.6-17.96-23.41-42.72-23.41-74.3v-93.07c0-31.56,8.27-55.78,24.83-72.67,16.54-16.86,39.95-25.31,70.23-25.31h222.75v138.8c0,47.91-11.35,85.47-34.05,112.67-22.7,27.23-53.45,40.83-92.22,40.83Z"/>
      </svg>
    </div>
    <script>
      console.log("[HTML] Inline script running - scripts work!");
      window.onerror = function(msg, url, line) {
        console.error("[HTML] Global error:", msg, "at", url, "line", line);
        document.getElementById("root").innerHTML = "<pre style='color:red;padding:20px'>Error: " + msg + "</pre>";
      };
    </script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
