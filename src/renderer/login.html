<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>Maestro - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Dark theme (default) */
      :root {
        --bg: #09090b;
        --text: #fafafa;
        --text-logo: #fafafa;
        --btn-shadow: 0 0 0 0.5px rgb(23,23,23), inset 0 0 0 1px rgba(255,255,255,0.14);
      }

      /* Light theme */
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --text: #09090b;
          --text-logo: #09090b;
          --btn-shadow: 0 0 0 0.5px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(0,0,0,0.1);
        }
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        -webkit-app-region: drag;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        -webkit-app-region: no-drag;
      }
      .logo {
        height: 40px;
        width: auto;
      }
      .logo path {
        fill: var(--text-logo);
      }
      .login-btn {
        height: 32px;
        padding: 0 12px;
        background: hsl(228 100% 50%);
        color: #fafafa;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: background-color 0.15s ease, transform 0.15s ease;
        box-shadow: var(--btn-shadow);
      }
      .login-btn:hover {
        background: hsl(228 100% 45%);
      }
      .login-btn:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Maestro Logo -->
      <svg class="logo" viewBox="0 0 984.63 849.11" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M885.32,488.23l99.31-115.94V127.37L876.8,0h-334.83l-52.12,60.77L438.4,0H114.92L5.68,127.37v164.92h114.92v-78.38c0-33.73,8.73-60.13,26.25-79.19,17.49-19.04,40.9-28.58,70.23-28.58h113.5c32.14,0,57.22,10.36,75.2,31.02,17.96,20.7,26.96,48.99,26.96,84.91v129H109.25L0,476.8v244.94l109.25,127.37h273.82l65.27-75.11,38.31,75.11h385.91l109.25-127.37v-166.56h-113.5v83.28c0,31.59-8.76,56.9-26.25,75.93-17.51,19.06-40.92,28.58-70.23,28.58h-122.01c-32.17,0-57.24-10.34-75.2-31.03-17.98-20.67-26.96-48.98-26.96-84.9v-138.8h337.67ZM547.65,222.07c0-35.92,8.98-64.22,26.96-84.91,17.96-20.67,43.03-31.02,75.2-31.02h129.11c28.38,0,50.83,8.99,67.39,26.95,16.54,17.96,24.83,42.73,24.83,74.29v86.55c0,30.49-8.51,54.44-25.54,71.85-17.03,17.42-40.21,26.12-69.52,26.12h-228.42v-169.82ZM306.46,742.97h-102.15c-28.38,0-50.37-8.98-65.98-26.94-15.6-17.96-23.41-42.72-23.41-74.3v-93.07c0-31.56,8.27-55.78,24.83-72.67,16.54-16.86,39.95-25.31,70.23-25.31h222.75v138.8c0,47.91-11.35,85.47-34.05,112.67-22.7,27.23-53.45,40.83-92.22,40.83Z"/>
      </svg>
      <button class="login-btn" id="loginBtn">Sign in</button>
    </div>
    <script>
      console.log('Login page loaded');
      console.log('window.desktopApi:', window.desktopApi);

      // Listen for auth success from main process (via deep link)
      // This ensures UI updates even if deep link arrives before click handler completes
      if (window.desktopApi && window.desktopApi.onAuthSuccess) {
        window.desktopApi.onAuthSuccess(function(user) {
          console.log('[Login] Auth success received:', user?.email);
          // Window will be reloaded by main process, no UI change needed
        });
      }

      document.getElementById('loginBtn').addEventListener('click', function() {
        console.log('Sign in clicked');
        console.log('desktopApi available:', !!window.desktopApi);

        if (window.desktopApi && window.desktopApi.startAuthFlow) {
          console.log('Calling startAuthFlow...');
          window.desktopApi.startAuthFlow();
        } else {
          console.error('Desktop API not available');
          alert('Desktop API not available. Please restart the app.');
        }
      });
    </script>
  </body>
</html>
